<h1 class="mb-6 text-2xl font-bold text-foreground">Charts</h1>

<form class="mb-4 flex flex-wrap items-center gap-2" (submit)="submit(); $event.preventDefault()">
  <label for="symbol-input" class="text-sm text-muted-foreground">Symbol</label>
  <input
    id="symbol-input"
    type="text"
    name="symbol"
    [(ngModel)]="symbol"
    class="w-32 rounded border border-border bg-background px-2 py-1 text-sm font-medium uppercase text-foreground focus:border-primary focus:outline-none"
    placeholder="AAPL"
    autocomplete="off" />
  <button
    type="submit"
    class="rounded bg-primary px-3 py-1 text-sm font-medium text-primary-foreground hover:opacity-90">
    Load
  </button>
</form>

<div class="h-[640px]">
  <app-chart-panel [symbol]="activeSymbol" [timeframe]="timeframe" [days]="days"></app-chart-panel>
</div>
